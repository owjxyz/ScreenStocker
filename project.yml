name: ScreenStocker
options:
  bundleIdPrefix: com.lukeoh
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic

targets:
  ScreenStocker:
    type: bundle
    platform: macOS
    productName: ScreenStocker
    sources:
      - path: ScreenStocker/Sources
      - path: ScreenStocker/Resources
    dependencies:
      - sdk: AppKit.framework
      - sdk: ScreenSaver.framework
      - sdk: Security.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukeoh.ScreenStocker
        INFOPLIST_FILE: ScreenStocker/Resources/Info.plist
        WRAPPER_EXTENSION: saver
        ENABLE_DEBUG_DYLIB: "NO"
        SKIP_INSTALL: "NO"
        INSTALL_PATH: "$(HOME)/Library/Screen Savers"

  ScreenStockerApp:
    type: application
    platform: macOS
    productName: ScreenStocker
    sources:
      - path: ScreenStockerApp/Sources
      - path: ScreenStockerApp/Resources
      - path: ScreenStocker/Sources/Preferences
      - path: ScreenStocker/Sources/Stocks
    dependencies:
      - sdk: AppKit.framework
      - sdk: ScreenSaver.framework
      - sdk: Security.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukeoh.ScreenStockerApp
        PRODUCT_NAME: ScreenStocker
        INFOPLIST_FILE: ScreenStockerApp/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_DEBUG_DYLIB: "NO"
    preBuildScripts:
      - name: Generate App Icon
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          /usr/bin/swift \
            -module-cache-path "$DERIVED_FILE_DIR/SwiftModuleCache" \
            "$SRCROOT/Scripts/generate-app-icon-from-icon-composer.swift" \
            "$SRCROOT/ScreenStockerApp/IconComposer/ScreenStockerIcon.icon" \
            "$SRCROOT/ScreenStockerApp/Resources/Assets.xcassets/AppIcon.appiconset"

  ScreenStockerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ScreenStockerTests
      - path: ScreenStocker/Sources/Stocks
      - path: ScreenStocker/Sources/Preferences
    dependencies:
      - sdk: ScreenSaver.framework
      - sdk: Security.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
